{% extends "base.html" %}

{% block title %}Создание заказа - {{ subject_name }}{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <div class="card">
        <div class="card-header">
            📝 Создание нового заказа
        </div>
        
        <form method="POST" action="/creator/new" id="orderForm">
            <div class="form-group">
                <label for="title">Название заказа *</label>
                <input type="text" id="title" name="title" class="form-control" 
                       placeholder="Например: Заказ для стола №5 / Наряд-заказ №123" required>
            </div>
            
            <div class="form-group">
                <label for="description">Описание / Комментарий</label>
                <textarea id="description" name="description" class="form-control" 
                          placeholder="Опишите детали заказа..."></textarea>
            </div>
            
            <!-- Позиции заказа -->
            <div class="form-group">
                <label>Позиции заказа</label>
                <div id="itemsContainer">
                    <div class="item-row" style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                        <input type="text" name="item_name[]" class="form-control" 
                               placeholder="Название (блюдо/запчасть/услуга)" style="flex: 2;">
                        <input type="number" name="item_quantity[]" class="form-control" 
                               placeholder="Кол-во" value="1" min="1" style="flex: 1;">
                        <input type="number" name="item_price[]" class="form-control" 
                               placeholder="Цена" step="0.01" min="0" style="flex: 1;">
                    </div>
                </div>
                
                <button type="button" class="btn btn-sm btn-primary mt-2" onclick="addItemRow()">
                    + Добавить позицию
                </button>
            </div>
            
            <div style="margin-top: 1.5rem; display: flex; gap: 0.5rem;">
                <button type="submit" class="btn btn-success">💾 Создать заказ</button>
                <a href="/creator" class="btn btn-secondary" style="background-color: #95a5a6; color: white;">
                    ← Отмена
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    function addItemRow() {
        const container = document.getElementById('itemsContainer');
        const newRow = document.createElement('div');
        newRow.className = 'item-row';
        newRow.style.cssText = 'display: flex; gap: 0.5rem; margin-bottom: 0.5rem;';
        newRow.innerHTML = `
            <input type="text" name="item_name[]" class="form-control" 
                   placeholder="Название (блюдо/запчасть/услуга)" style="flex: 2;">
            <input type="number" name="item_quantity[]" class="form-control" 
                   placeholder="Кол-во" value="1" min="1" style="flex: 1;">
            <input type="number" name="item_price[]" class="form-control" 
                   placeholder="Цена" step="0.01" min="0" style="flex: 1;">
        `;
        container.appendChild(newRow);
    }
</script>
{% endblock %}
